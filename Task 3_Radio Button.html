<!DOCTYPE html>
<html>
    <body>
        <h2>Radio Button</h2>
        <p>Gender</p>
        <form>
            <input type="radio" name="gender" id="male" value="HTML">
            <label for="male">Male</label><br>
            <input type="radio" name="gender" id="female" value="CSS" checked>
            <label for="female">Female</label><br>
        </form>
    </body>
</html>
